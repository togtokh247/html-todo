<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do list</title>
  <link rel="stylesheet" href="style2.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">To-Do list</h1>

    <div class="header">
      <input class="add-input" type="text" placeholder="Add a new task..." />
      <button class="create-btn">Add</button>
    </div>

    <div class="buttons">
      <button class="chosen">All</button>
      <button>Active</button>
      <button>Completed</button>
    </div>

    <div class="list">
    </div>

    <div class="footer">
      <p class="summary">0 of 0 tasks completed</p>
      <button class="clear-btn">Clear completed</button>
    </div>
  </div>

  <script src="12.js"></script>
</body>
</html>
